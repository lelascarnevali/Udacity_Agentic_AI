<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1160" viewBox="0 0 1800 1160" role="img" aria-labelledby="title desc">
  <title id="title">Beaver's Choice Paper Company Multi-Agent Architecture</title>
  <desc id="desc">The orchestrator routes customer requests through inventory, quote, and fulfillment stages. Tool ownership matches the implementation, including supplier timing on inventory, reporting on inventory and fulfillment, and a direct inventory-query shortcut from the orchestrator.</desc>
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .group { fill: #ffffff; stroke: #9aa5b1; stroke-width: 2; }
      .agent { fill: #eef6ff; stroke: #2f5bea; stroke-width: 2.5; }
      .tool { fill: #fff7e8; stroke: #d97706; stroke-width: 2; }
      .external { fill: #fff1f2; stroke: #be123c; stroke-width: 2; }
      .db { fill: #e9f7ef; stroke: #15803d; stroke-width: 2.5; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #1f2933; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #52616b; }
      .label { font: 700 19px Arial, Helvetica, sans-serif; fill: #102a43; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #243b53; }
      .tiny { font: 400 12px Arial, Helvetica, sans-serif; fill: #334e68; }
      .line { stroke: #475569; stroke-width: 2.4; fill: none; }
      .dashed { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1160"/>
  <text class="title" x="900" y="50" text-anchor="middle">Beaver's Choice Paper Company Multi-Agent Architecture</text>
  <text class="subtitle" x="900" y="77" text-anchor="middle">Diagram updated to match the running smolagents implementation and helper ownership in project_starter.py</text>

  <rect class="group" x="60" y="110" width="1680" height="330" rx="18" ry="18"/>
  <text class="label" x="95" y="142">Agent Layer</text>

  <rect class="tool" x="650" y="145" width="500" height="46" rx="14" ry="14"/>
  <text class="small" x="900" y="174" text-anchor="middle">Customer request</text>

  <rect class="agent" x="560" y="220" width="680" height="86" rx="16" ry="16"/>
  <text class="label" x="900" y="252" text-anchor="middle">PaperCompanyOrchestrator</text>
  <text class="small" x="900" y="276" text-anchor="middle">Parses requests, delegates work, handles the inventory-query shortcut, and returns the customer-safe response</text>

  <rect class="agent" x="120" y="335" width="440" height="82" rx="16" ry="16"/>
  <text class="label" x="340" y="366" text-anchor="middle">InventoryAgent</text>
  <text class="small" x="340" y="390" text-anchor="middle">Checks stock, shortfalls, deadlines, and replenishment feasibility</text>

  <rect class="agent" x="680" y="335" width="440" height="82" rx="16" ry="16"/>
  <text class="label" x="900" y="366" text-anchor="middle">QuoteAgent</text>
  <text class="small" x="900" y="390" text-anchor="middle">Builds discounted quotes from accepted items and quote history</text>

  <rect class="agent" x="1240" y="335" width="440" height="82" rx="16" ry="16"/>
  <text class="label" x="1460" y="366" text-anchor="middle">FulfillmentAgent</text>
  <text class="small" x="1460" y="390" text-anchor="middle">Writes transactions and summarizes the final order outcome</text>

  <path class="line" marker-end="url(#arrow)" d="M900 191 L900 220"/>
  <path class="line" marker-end="url(#arrow)" d="M860 306 C760 320, 560 325, 340 335"/>
  <path class="line" marker-end="url(#arrow)" d="M900 306 L900 335"/>
  <path class="line" marker-end="url(#arrow)" d="M940 306 C1040 320, 1240 325, 1460 335"/>

  <text class="tiny" x="620" y="315" text-anchor="middle">1. assess_inventory(parsed_request_json)</text>
  <text class="tiny" x="900" y="321" text-anchor="middle">2. build_quote(request_bundle_json)</text>
  <text class="tiny" x="1180" y="315" text-anchor="middle">3. finalize_order(order_bundle_json)</text>

  <rect class="group" x="60" y="475" width="1680" height="505" rx="18" ry="18"/>
  <text class="label" x="95" y="507">Tool Layer</text>

  <rect class="tool" x="100" y="540" width="500" height="330" rx="16" ry="16"/>
  <text class="label" x="350" y="572" text-anchor="middle">InventoryAgent tools</text>
  <text class="small" x="350" y="602" text-anchor="middle">
    <tspan x="350" dy="0">inventory_snapshot_tool(): get_all_inventory()</tspan>
    <tspan x="350" dy="24">Purpose: current stock snapshot</tspan>
    <tspan x="350" dy="34">stock_level_tool(): get_stock_level()</tspan>
    <tspan x="350" dy="24">Purpose: per-item stock lookup</tspan>
    <tspan x="350" dy="34">supplier_delivery_tool(): get_supplier_delivery_date()</tspan>
    <tspan x="350" dy="24">Purpose: replenishment ETA</tspan>
    <tspan x="350" dy="34">financial_report_tool(): generate_financial_report()</tspan>
    <tspan x="350" dy="24">Purpose: operational snapshot</tspan>
  </text>

  <rect class="tool" x="650" y="540" width="500" height="150" rx="16" ry="16"/>
  <text class="label" x="900" y="572" text-anchor="middle">QuoteAgent tools</text>
  <text class="small" x="900" y="608" text-anchor="middle">
    <tspan x="900" dy="0">quote_history_tool(): search_quote_history()</tspan>
    <tspan x="900" dy="24">Purpose: historical pricing context</tspan>
  </text>

  <rect class="tool" x="1200" y="540" width="500" height="370" rx="16" ry="16"/>
  <text class="label" x="1450" y="572" text-anchor="middle">FulfillmentAgent tools</text>
  <text class="small" x="1450" y="602" text-anchor="middle">
    <tspan x="1450" dy="0">cash_balance_tool(): get_cash_balance()</tspan>
    <tspan x="1450" dy="24">Purpose: available cash lookup</tspan>
    <tspan x="1450" dy="34">record_stock_order_tool(): create_transaction() for stock_orders</tspan>
    <tspan x="1450" dy="24">Purpose: replenishment logging</tspan>
    <tspan x="1450" dy="34">record_sale_tool(): create_transaction() for sales</tspan>
    <tspan x="1450" dy="24">Purpose: sale logging</tspan>
    <tspan x="1450" dy="34">financial_report_tool(): generate_financial_report()</tspan>
    <tspan x="1450" dy="24">Purpose: post-order reporting</tspan>
  </text>

  <rect class="external" x="100" y="890" width="500" height="70" rx="16" ry="16"/>
  <text class="small" x="350" y="920" text-anchor="middle">Supplier lead-time logic</text>
  <text class="tiny" x="350" y="944" text-anchor="middle">Used by supplier_delivery_tool() for replenishment ETA</text>

  <path class="line" marker-end="url(#arrow)" d="M340 417 L350 540"/>
  <path class="line" marker-end="url(#arrow)" d="M900 417 L900 540"/>
  <path class="line" marker-end="url(#arrow)" d="M1460 417 L1450 540"/>
  <path class="line dashed" marker-end="url(#arrow)" d="M840 306 C690 360, 500 440, 350 540"/>
  <path class="line dashed" marker-end="url(#arrow)" d="M470 417 C700 485, 1100 520, 1320 540"/>
  <path class="line" marker-end="url(#arrow)" d="M350 870 L350 890"/>

  <text class="tiny" x="610" y="438" text-anchor="middle">inventory_query shortcut to snapshot and reporting</text>
  <text class="tiny" x="885" y="500" text-anchor="middle">direct cash feasibility lookup during inventory assessment</text>

  <rect class="db" x="650" y="930" width="1050" height="140" rx="18" ry="18"/>
  <text class="label" x="1175" y="968" text-anchor="middle">SQLite: munder_difflin.db</text>
  <text class="small" x="1175" y="995" text-anchor="middle">transactions | inventory | quotes | quote_requests</text>
  <text class="tiny" x="1175" y="1023" text-anchor="middle">Inventory tools read transactions plus inventory. Quote tools read quotes plus quote_requests.</text>
  <text class="tiny" x="1175" y="1043" text-anchor="middle">Fulfillment tools read and write transactions and read inventory for reporting context.</text>

  <path class="line dashed" marker-end="url(#arrow)" d="M500 870 C620 920, 760 930, 830 930"/>
  <path class="line dashed" marker-end="url(#arrow)" d="M900 690 L900 930"/>
  <path class="line dashed" marker-end="url(#arrow)" d="M1450 910 L1450 930"/>

  <text class="tiny" x="725" y="900" text-anchor="middle">reads transactions + inventory</text>
  <text class="tiny" x="940" y="820" text-anchor="middle">reads quotes + quote_requests</text>
  <text class="tiny" x="1500" y="922" text-anchor="middle">reads and writes transactions + inventory</text>

  <text class="tiny" x="900" y="1120" text-anchor="middle">The diagram mirrors the running pipeline in project_starter.py: orchestration is sequential, supplier timing belongs to inventory, and reporting is shared across inventory and fulfillment.</text>
</svg>
